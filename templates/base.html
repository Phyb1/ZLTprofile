<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZLT Company Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --zlt-green: #2E7D32;
      --zlt-gold: #C9A961;
    }
    .bg-zlt { background-color: var(--zlt-green); }
    .text-zlt { color: var(--zlt-green); }
    .btn-zlt { background-color: var(--zlt-gold); border-color: var(--zlt-gold); color: #000; }
    .btn-zlt:hover { background-color: #b5984f; border-color: #b5984f; color: #000; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-zlt">
    <div class="container">
      <a class="navbar-brand text-white fw-bold" href="/">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="me-2">
          <path d="M12 2C7 2 4 7 4 11C4 15 7 18 12 18C17 18 20 15 20 11C20 7 17 2 12 2Z" fill="#C9A961"/>
          <path d="M12 18V22" stroke="#C9A961" stroke-width="2" stroke-linecap="round"/>
          <path d="M8 15C8 15 9 16 12 16C15 16 16 15 16 15" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        ZLT
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav ms-auto align-items-center gap-2">
          <a class="nav-link text-white" href="/">Home</a>
          <a class="nav-link text-white" href="/about/">About</a>
          <a class="nav-link text-white" href="/services/">Services</a>
          <a class="nav-link text-white" href="/floors/">Floors</a>
          <a class="nav-link text-white" href="/contact/">Contact</a>
          <button id="themeToggle" class="btn btn-sm btn-outline-light ms-2" title="Toggle theme">◐</button>
        </div>
      </div>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0 small">© 2026 Zimbabwe Leaf Tobacco. Built with pride by a ZLT team member.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Tiny dark mode toggle - 12 lines
    const toggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-bs-theme', saved);
    
    toggle.onclick = () => {
      const current = html.getAttribute('data-bs-theme');
      const next = current === 'light' ? 'dark' : 'light';
      html.setAttribute('data-bs-theme', next);
      localStorage.setItem('theme', next);
    };
  </script>
</body>
</html>
